<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lista zadań (TODO)</title>
		<style>
			:root {
				--font-body: Arial, sans-serif;
				--space-2: 0.5rem;
				--space-3: 0.75rem;
				--space-4: 1rem;
				--space-5: 1.25rem;
				--radius-1: 0.375rem;
				--radius-2: 0.5rem;
				--radius-3: 0.75rem;
				--color-page: #f8fafc;
				--color-text: #111827;
				--color-text-muted: #6b7280;
				--color-surface: #ffffff;
				--color-surface-elevated: #ffffff;
				--color-surface-muted: #f2f2f2;
				--color-surface-subtle: #f0f9ff;
				--color-border: #e5e7eb;
				--color-border-muted: #d9d9d9;
				--color-border-strong: #222222;
				--color-border-subtle: #bae6fd;
				--color-accent: #2563eb;
				--color-focus: #1d4ed8;
				--color-accent-contrast: #ffffff;
				--layout-max-width: 37.5rem;
				--layout-page-margin: 2.5rem;
				--layout-page-padding: 1.25rem;
				--motion-fast: 160ms;
				--motion-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
				--button-bg: var(--color-surface-muted);
				--button-bg-hover: #e7e7e7;
				--button-bg-active: #e2e2e2;
				--button-border: var(--color-border-muted);
				--button-border-hover: #cfcfcf;
				--button-border-active: #bdbdbd;
				--button-fg: var(--color-text);
			}

			.sr-only {
				position: absolute;
				width: 0.0625rem;
				height: 0.0625rem;
				padding: 0;
				margin: -0.0625rem;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			body {
				font-family: var(--font-body);
				max-width: var(--layout-max-width);
				margin: var(--layout-page-margin) auto;
				padding: var(--layout-page-padding);
				background: var(--color-page);
				color: var(--color-text);
				line-height: 1.5;
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}

			header {
				margin-bottom: var(--space-5);
			}

			main {
				display: flex;
				flex-direction: column;
				gap: var(--space-4);
			}

			.page-description {
				margin: var(--space-2) 0 0;
				color: var(--color-text-muted);
			}

			.panel {
				padding: var(--space-5);
				background: var(--color-surface-elevated);
				border: 0.0625rem solid var(--color-border);
				border-radius: var(--radius-3);
				box-shadow: 0 0.0625rem 0.125rem rgb(17 24 39 / 0.06);
			}

			.panel h2 {
				margin: 0 0 var(--space-3);
				font-size: 1rem;
			}

			.section-header {
				display: flex;
				align-items: baseline;
				justify-content: space-between;
				gap: var(--space-3);
				margin-bottom: var(--space-3);
			}

			form {
				display: flex;
				gap: var(--space-2);
				margin-bottom: var(--space-3);
			}

			.filters {
				display: flex;
				gap: var(--space-2);
				margin-bottom: 0;
			}

			.filter-button {
				--button-radius: var(--radius-1);
				--button-padding-y: 0.375rem;
				--button-padding-x: 0.625rem;
			}

			.filter-button.active {
				--button-bg: #1c1c1c;
				--button-bg-hover: #2a2a2a;
				--button-bg-active: #111111;
				--button-border: var(--color-border-strong);
				--button-border-hover: #2a2a2a;
				--button-border-active: #111111;
				--button-fg: var(--color-accent-contrast);
			}

			input {
				flex: 1;
				min-width: 0;
				padding: 0.625rem;
				border: 0.0625rem solid var(--color-border-muted);
				border-radius: var(--radius-2);
				font: inherit;
				color: inherit;
			}

			button:focus-visible,
			input:focus-visible {
				outline: 0.1875rem solid var(--color-focus);
				outline-offset: 0.125rem;
			}

			button {
				cursor: pointer;
				font: inherit;
				padding: var(--button-padding-y, 0.375rem)
					var(--button-padding-x, 0.625rem);
				color: var(--button-fg);
				background: var(--button-bg);
				border: 0.0625rem solid var(--button-border);
				border-radius: var(--button-radius, var(--radius-1));
				transition:
					background-color var(--motion-fast) var(--motion-standard),
					border-color var(--motion-fast) var(--motion-standard),
					color var(--motion-fast) var(--motion-standard);
			}

			button:hover {
				background: var(--button-bg-hover);
				border-color: var(--button-border-hover);
			}

			button:active {
				background: var(--button-bg-active);
				border-color: var(--button-border-active);
			}

			button:disabled {
				cursor: not-allowed;
				opacity: 0.7;
			}

			form button {
				--button-bg: var(--color-surface-muted);
				--button-bg-hover: #ededed;
				--button-bg-active: #e5e5e5;
				--button-border: var(--color-border-muted);
				--button-border-hover: #cfcfcf;
				--button-border-active: #bdbdbd;
				--button-radius: var(--radius-2);
				--button-padding-y: 0.875rem;
				--button-padding-x: 1.25rem;
				min-width: 7.5rem;
				font-weight: 600;
			}

			ul {
				list-style: none;
				margin: 0;
				padding-left: 0;
			}

			.help-text,
			.status-text,
			.section-meta,
			.empty-state {
				margin: 0;
				color: var(--color-text-muted);
			}

			.help-text,
			.section-meta,
			.status-text {
				font-size: 0.9375rem;
			}

			.status-text {
				margin-top: var(--space-2);
				overflow-wrap: anywhere;
				word-break: break-word;
			}

			.status-text.is-error {
				color: #b91c1c;
			}

			.empty-state {
				padding: var(--space-4);
				border: 0.0625rem dashed var(--color-border-muted);
				border-radius: var(--radius-2);
				background: var(--color-surface-muted);
			}

			li {
				display: flex;
				align-items: flex-start;
				justify-content: space-between;
				gap: var(--space-4);
				margin-bottom: var(--space-2);
				padding: 0.75rem;
				border-radius: var(--radius-3);
				background: var(--color-surface);
				border: 0.0625rem solid var(--color-border);
				transition:
					background-color var(--motion-fast) var(--motion-standard),
					border-color var(--motion-fast) var(--motion-standard);
			}

			li > label {
				display: flex;
				align-items: center;
				min-width: 0;
				gap: var(--space-2);
				cursor: pointer;
			}

			li input[type='checkbox'] {
				flex: 0 0 auto;
				margin-top: 0.125rem;
				accent-color: var(--color-accent);
			}

			li .task-text {
				min-width: 0;
				overflow-wrap: anywhere;
			}

			li.done {
				background: var(--color-surface-subtle);
				border-color: var(--color-border-subtle);
			}

			li.done .task-text {
				text-decoration: line-through;
				color: var(--color-text-muted);
				opacity: 0.8;
			}

			li button {
				--button-bg: var(--color-surface-muted);
				--button-bg-hover: #eaeaea;
				--button-bg-active: #e2e2e2;
				--button-border: var(--color-border-muted);
				--button-border-hover: #cfcfcf;
				--button-border-active: #bdbdbd;
				--button-radius: var(--radius-1);
				--button-padding-y: 0.375rem;
				--button-padding-x: 0.625rem;
			}

			@media (max-width: 26.25rem) {
				body {
					margin: 1.25rem auto;
					padding: 0.75rem;
				}

				.panel {
					padding: var(--space-4);
				}

				form {
					flex-direction: column;
				}

				input,
				button {
					width: 100%;
				}

				.filters {
					flex-wrap: wrap;
				}

				li {
					flex-direction: column;
					align-items: stretch;
					gap: var(--space-3);
				}

				li > label {
					width: 100%;
					display: grid;
					grid-template-columns: auto minmax(0, 1fr);
					align-items: start;
					gap: var(--space-2);
				}

				li input[type='checkbox'] {
					margin-top: 0.25rem;
				}

				li .task-text {
					min-width: 0;
					overflow-wrap: anywhere;
					word-break: break-word;
				}

				li button {
					width: 100%;
				}
			}
		</style>
	</head>

	<body>
		<header>
			<h1>Lista zadań (TODO)</h1>
			<p class="page-description">
				Dodawaj zadania, oznaczaj je jako wykonane i filtruj listę.
			</p>
		</header>

		<main>
			<section class="panel" aria-labelledby="task-form-heading">
				<h2 id="task-form-heading">Dodawanie zadania</h2>
				<form id="task-form" novalidate>
					<label class="sr-only" for="task-input">Treść zadania</label>
					<input
						id="task-input"
						name="task"
						type="text"
						maxlength="100"
						placeholder="Dodaj zadanie (maks. 100 znaków)"
						autocomplete="off"
						aria-describedby="task-help task-status"
					/>
					<button type="submit">Dodaj</button>
				</form>
				<p id="task-help" class="help-text">
					Maksymalnie 100 znaków. Naciśnij Enter, aby dodać zadanie.
				</p>
				<p
					id="task-status"
					class="status-text"
					role="status"
					aria-live="polite"
					aria-atomic="true"
				></p>
			</section>

			<section class="panel" aria-labelledby="filters-heading">
				<h2 id="filters-heading">Filtry</h2>
				<div class="filters" role="group" aria-label="Filtr listy zadań">
					<button
						class="filter-button active"
						type="button"
						data-filter="all"
						aria-pressed="true"
					>
						Wszystkie
					</button>
					<button
						class="filter-button"
						type="button"
						data-filter="active"
						aria-pressed="false"
					>
						Aktywne
					</button>
					<button
						class="filter-button"
						type="button"
						data-filter="done"
						aria-pressed="false"
					>
						Wykonane
					</button>
				</div>
			</section>

			<section class="panel" aria-labelledby="tasks-heading">
				<div class="section-header">
					<h2 id="tasks-heading">Zadania</h2>
					<p
						id="task-summary"
						class="section-meta"
						aria-live="polite"
						aria-atomic="true"
					></p>
				</div>
				<p id="empty-state" class="empty-state" hidden>
					Brak zadań do wyświetlenia.
				</p>
				<ul id="task-list" aria-labelledby="tasks-heading"></ul>
			</section>
		</main>
		<script>
			const form = document.querySelector('#task-form');
			const input = document.querySelector('#task-input');
			const list = document.querySelector('#task-list');
			const filterButtons = document.querySelectorAll('.filter-button');
			const taskStatus = document.querySelector('#task-status');
			const taskSummary = document.querySelector('#task-summary');
			const emptyState = document.querySelector('#empty-state');

			const storageKey = 'todo-items';

			const createTaskId = () => {
				if (window.crypto && typeof window.crypto.randomUUID === 'function') {
					return window.crypto.randomUUID();
				}

				return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
			};

			const normalizeTask = (task) => {
				if (!task || typeof task !== 'object') {
					return null;
				}

				const text = typeof task.text === 'string' ? task.text.trim() : '';

				if (!text) {
					return null;
				}

				return {
					id: typeof task.id === 'string' && task.id ? task.id : createTaskId(),
					text,
					done: task.done === true,
				};
			};

			const getTasks = () => {
				const raw = localStorage.getItem(storageKey);

				if (!raw) {
					return [];
				}

				try {
					const parsed = JSON.parse(raw);
					return Array.isArray(parsed)
						? parsed.map(normalizeTask).filter((task) => task !== null)
						: [];
				} catch {
					return [];
				}
			};

			const saveTasks = (tasks) => {
				localStorage.setItem(storageKey, JSON.stringify(tasks));
			};

			const state = {
				tasks: getTasks(),
				currentFilter: 'all',
			};

			const filterLabels = {
				all: 'wszystkie',
				active: 'aktywne',
				done: 'wykonane',
			};

			const isTaskVisible = (task, filter) => {
				if (filter === 'active') return !task.done;
				if (filter === 'done') return task.done;
				return true;
			};

			const getVisibleTasks = () =>
				state.tasks.filter((task) => isTaskVisible(task, state.currentFilter));

			const setStatus = (message, isError = false) => {
				taskStatus.textContent = message;
				taskStatus.classList.toggle('is-error', isError);
			};

			const updateSummary = () => {
				const visibleTasks = getVisibleTasks();

				if (state.currentFilter === 'all') {
					taskSummary.textContent = `Wszystkie zadania: ${state.tasks.length}.`;
					return;
				}

				taskSummary.textContent = `Widoczne zadania: ${visibleTasks.length} z ${state.tasks.length}.`;
			};

			const setFilter = (filter) => {
				state.currentFilter = filter;

				filterButtons.forEach((button) => {
					const isActive = button.dataset.filter === filter;

					button.classList.toggle('active', isActive);
					button.setAttribute('aria-pressed', String(isActive));
				});

				render();
				setStatus(`Wybrano filtr: ${filterLabels[filter]}.`);
			};

			const render = () => {
				const filteredTasks = getVisibleTasks();

				list.replaceChildren();
				list.hidden = filteredTasks.length === 0;
				emptyState.hidden = filteredTasks.length !== 0;
				updateSummary();

				filteredTasks.forEach((task) => {
					const li = document.createElement('li');
					const leftSide = document.createElement('label');
					const text = document.createElement('span');
					const removeButton = document.createElement('button');
					const checkbox = document.createElement('input');

					checkbox.type = 'checkbox';
					checkbox.checked = task.done;
					checkbox.setAttribute('aria-label', `Oznacz zadanie: ${task.text}`);
					text.textContent = task.text;
					text.classList.add('task-text');
					removeButton.textContent = 'Usuń';
					removeButton.type = 'button';
					removeButton.setAttribute('aria-label', `Usuń zadanie: ${task.text}`);
					leftSide.classList.add('task-label');

					if (task.done) {
						li.classList.add('done');
					}

					leftSide.append(checkbox, text);
					li.append(leftSide, removeButton);
					list.appendChild(li);

					checkbox.addEventListener('change', () => {
						state.tasks = state.tasks.map((currentTask) =>
							currentTask.id === task.id
								? { ...currentTask, done: checkbox.checked }
								: currentTask,
						);
						saveTasks(state.tasks);
						render();
						setStatus(
							checkbox.checked
								? `Oznaczono jako wykonane: ${task.text}.`
								: `Oznaczono jako aktywne: ${task.text}.`,
						);
					});

					removeButton.addEventListener('click', () => {
						state.tasks = state.tasks.filter(
							(currentTask) => currentTask.id !== task.id,
						);
						saveTasks(state.tasks);
						render();
						setStatus(`Usunięto zadanie: ${task.text}.`);
					});
				});
			};

			const handleSubmit = (event) => {
				event.preventDefault();

				const value = input.value.trim();
				if (!value) {
					setStatus('Wpisz treść zadania.', true);
					return;
				}

				state.tasks.unshift({ id: createTaskId(), text: value, done: false });
				saveTasks(state.tasks);

				input.value = '';
				render();
				setStatus(`Dodano zadanie: ${value}.`);
				input.focus();
			};

			form.addEventListener('submit', handleSubmit);

			filterButtons.forEach((button) => {
				button.addEventListener('click', () => {
					const filter = button.dataset.filter;

					if (filter === 'all' || filter === 'active' || filter === 'done') {
						setFilter(filter);
					}
				});
			});

			render();
			setStatus('Gotowe do dodawania zadań.');
		</script>
	</body>
</html>
