<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lista zadań (TODO)</title>
		<style>
			:root {
				--font-body: Arial, sans-serif;
				--space-2: 0.5rem;
				--space-3: 0.75rem;
				--space-4: 1rem;
				--space-5: 1.25rem;
				--radius-1: 0.375rem;
				--radius-2: 0.5rem;
				--radius-3: 0.75rem;
				--color-text: #111827;
				--color-text-muted: #6b7280;
				--color-surface: #ffffff;
				--color-surface-muted: #f2f2f2;
				--color-surface-subtle: #f0f9ff;
				--color-border: #e5e7eb;
				--color-border-muted: #d9d9d9;
				--color-border-strong: #222222;
				--color-border-subtle: #bae6fd;
				--color-accent: #2563eb;
				--color-accent-contrast: #ffffff;
				--layout-max-width: 37.5rem;
				--layout-page-margin: 2.5rem;
				--layout-page-padding: 1.25rem;
				--motion-fast: 160ms;
				--motion-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
				--button-bg: var(--color-surface-muted);
				--button-bg-hover: #e7e7e7;
				--button-bg-active: #e2e2e2;
				--button-border: var(--color-border-muted);
				--button-border-hover: #cfcfcf;
				--button-border-active: #bdbdbd;
				--button-fg: var(--color-text);
			}

			body {
				font-family: var(--font-body);
				max-width: var(--layout-max-width);
				margin: var(--layout-page-margin) auto;
				padding: var(--layout-page-padding);
				color: var(--color-text);
				line-height: 1.5;
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}

			form {
				display: flex;
				gap: var(--space-2);
				margin-bottom: var(--space-5);
			}

			.filters {
				display: flex;
				gap: var(--space-2);
				margin-bottom: var(--space-4);
			}

			.filter-button {
				--button-radius: var(--radius-1);
				--button-padding-y: 0.375rem;
				--button-padding-x: 0.625rem;
			}

			.filter-button.active {
				--button-bg: #1c1c1c;
				--button-bg-hover: #2a2a2a;
				--button-bg-active: #111111;
				--button-border: var(--color-border-strong);
				--button-border-hover: #2a2a2a;
				--button-border-active: #111111;
				--button-fg: var(--color-accent-contrast);
			}

			input {
				flex: 1;
				min-width: 0;
				padding: 0.625rem;
				border: 0.0625rem solid var(--color-border-muted);
				border-radius: var(--radius-2);
				font: inherit;
				color: inherit;
			}

			button {
				cursor: pointer;
				font: inherit;
				padding: var(--button-padding-y, 0.375rem)
					var(--button-padding-x, 0.625rem);
				color: var(--button-fg);
				background: var(--button-bg);
				border: 0.0625rem solid var(--button-border);
				border-radius: var(--button-radius, var(--radius-1));
				transition:
					background-color var(--motion-fast) var(--motion-standard),
					border-color var(--motion-fast) var(--motion-standard),
					color var(--motion-fast) var(--motion-standard);
			}

			button:hover {
				background: var(--button-bg-hover);
				border-color: var(--button-border-hover);
			}

			button:active {
				background: var(--button-bg-active);
				border-color: var(--button-border-active);
			}

			form button {
				--button-bg: var(--color-surface-muted);
				--button-bg-hover: #ededed;
				--button-bg-active: #e5e5e5;
				--button-border: var(--color-border-muted);
				--button-border-hover: #cfcfcf;
				--button-border-active: #bdbdbd;
				--button-radius: var(--radius-2);
				--button-padding-y: 0.875rem;
				--button-padding-x: 1.25rem;
				min-width: 7.5rem;
				font-weight: 600;
			}

			ul {
				list-style: none;
				margin: 0;
				padding-left: 0;
			}

			li {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: var(--space-4);
				margin-bottom: var(--space-2);
				padding: 0.75rem;
				border-radius: var(--radius-3);
				background: var(--color-surface);
				border: 0.0625rem solid var(--color-border);
				transition:
					background-color var(--motion-fast) var(--motion-standard),
					border-color var(--motion-fast) var(--motion-standard);
			}

			li > div {
				display: flex;
				align-items: center;
				min-width: 0;
				gap: var(--space-2);
			}

			li input[type='checkbox'] {
				flex: 0 0 auto;
				margin-top: 0.125rem;
				accent-color: var(--color-accent);
			}

			li .task-text {
				min-width: 0;
				overflow-wrap: anywhere;
			}

			li button {
				--button-bg: var(--color-surface-muted);
				--button-bg-hover: #eaeaea;
				--button-bg-active: #e2e2e2;
				--button-border: var(--color-border-muted);
				--button-border-hover: #cfcfcf;
				--button-border-active: #bdbdbd;
				--button-radius: var(--radius-1);
				--button-padding-y: 0.375rem;
				--button-padding-x: 0.625rem;
			}

			li.done {
				background: var(--color-surface-subtle);
				border-color: var(--color-border-subtle);
			}

			li.done .task-text {
				text-decoration: line-through;
				color: var(--color-text-muted);
				opacity: 0.8;
			}

			@media (max-width: 26.25rem) {
				body {
					margin: 1.25rem auto;
					padding: 0.75rem;
				}

				form {
					flex-direction: column;
				}

				input,
				button {
					width: 100%;
				}

				.filters {
					flex-wrap: wrap;
				}

				li {
					flex-direction: column;
					align-items: stretch;
					gap: var(--space-3);
				}

				li > div {
					width: 100%;
					display: grid;
					grid-template-columns: auto minmax(0, 1fr);
					align-items: start;
					gap: var(--space-2);
				}

				li input[type='checkbox'] {
					margin-top: 0.25rem;
				}

				li .task-text {
					min-width: 0;
					overflow-wrap: anywhere;
					word-break: break-word;
				}

				li button {
					width: 100%;
				}
			}
		</style>
	</head>

	<body>
		<h1>Lista zadań (TODO)</h1>
		<form>
			<input
				type="text"
				maxlength="100"
				placeholder="Dodaj zadanie (maks. 100 znaków)"
			/>
			<button type="submit">Dodaj</button>
		</form>
		<div class="filters">
			<button class="filter-button active" type="button" data-filter="all">
				Wszystkie
			</button>
			<button class="filter-button" type="button" data-filter="active">
				Aktywne
			</button>
			<button class="filter-button" type="button" data-filter="done">
				Wykonane
			</button>
		</div>
		<ul></ul>
		<script>
			const form = document.querySelector('form');
			const input = document.querySelector('input');
			const list = document.querySelector('ul');
			const filterButtons = document.querySelectorAll('.filter-button');

			const storageKey = 'todo-items';

			const getTasks = () => {
				const raw = localStorage.getItem(storageKey);

				if (!raw) {
					return [];
				}

				try {
					const parsed = JSON.parse(raw);
					return Array.isArray(parsed) ? parsed : [];
				} catch {
					return [];
				}
			};

			const saveTasks = (tasks) => {
				localStorage.setItem(storageKey, JSON.stringify(tasks));
			};

			const state = {
				tasks: getTasks(),
				currentFilter: 'all',
			};

			const isTaskVisible = (task, filter) => {
				if (filter === 'active') return !task.done;
				if (filter === 'done') return task.done;
				return true;
			};

			const setFilter = (filter) => {
				state.currentFilter = filter;

				filterButtons.forEach((button) => {
					button.classList.toggle('active', button.dataset.filter === filter);
				});

				render();
			};

			const render = () => {
				const filteredTasks = state.tasks
					.map((task, index) => ({ task, index }))
					.filter(({ task }) => isTaskVisible(task, state.currentFilter));

				list.innerHTML = '';

				filteredTasks.forEach(({ task, index }) => {
					const li = document.createElement('li');
					const leftSide = document.createElement('div');
					const text = document.createElement('span');
					const removeButton = document.createElement('button');
					const checkbox = document.createElement('input');

					checkbox.type = 'checkbox';
					checkbox.checked = task.done;
					text.textContent = task.text;
					text.classList.add('task-text');
					removeButton.textContent = 'Usuń';
					removeButton.type = 'button';

					if (task.done) {
						li.classList.add('done');
					}

					leftSide.append(checkbox, text);
					li.append(leftSide, removeButton);
					list.appendChild(li);

					checkbox.addEventListener('change', () => {
						state.tasks[index].done = checkbox.checked;
						saveTasks(state.tasks);
						render();
					});

					removeButton.addEventListener('click', () => {
						state.tasks = state.tasks.filter(
							(_, taskIndex) => taskIndex !== index,
						);
						saveTasks(state.tasks);
						render();
					});
				});
			};

			const handleSubmit = (event) => {
				event.preventDefault();

				const value = input.value.trim();
				if (!value) {
					return;
				}

				state.tasks.unshift({ text: value, done: false });
				saveTasks(state.tasks);

				input.value = '';
				render();
			};

			form.addEventListener('submit', handleSubmit);

			filterButtons.forEach((button) => {
				button.addEventListener('click', () => {
					const filter = button.dataset.filter;

					if (filter === 'all' || filter === 'active' || filter === 'done') {
						setFilter(filter);
					}
				});
			});

			render();
		</script>
	</body>
</html>
